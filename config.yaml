# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: polymarket-v2-indexer
description: Polymarket V2 — CTF Exchange, PolyUSD, Rewards

storage:
  postgres: true
  # clickhouse: true  # enable to additionally sync indexed data to ClickHouse

field_selection:
  transaction_fields:
    - hash
    - from

contracts:
  # ── CTF Exchange V2 ───────────────────────────────────────────────
  - name: CTFExchangeV2
    events:
      - event: "OrderFilled(bytes32 indexed orderHash, address indexed maker, address indexed taker, uint8 side, uint256 tokenId, uint256 makerAmountFilled, uint256 takerAmountFilled, uint256 fee, bytes32 builder, bytes32 metadata)"
      - event: "OrdersMatched(bytes32 indexed takerOrderHash, address indexed takerOrderMaker, uint8 side, uint256 tokenId, uint256 makerAmountFilled, uint256 takerAmountFilled)"
      - event: "FeeCharged(address indexed receiver, uint256 amount)"
      - event: "UserPaused(address indexed user, uint256 effectivePauseBlock)"
      - event: "TradingPaused(address indexed pauser)"
      - event: "TradingUnpaused(address indexed pauser)"
      - event: "NewAdmin(address indexed newAdminAddress, address indexed admin)"
      - event: "NewOperator(address indexed newOperatorAddress, address indexed admin)"

  # ── PolyUSD (CollateralToken) ─────────────────────────────────────
  - name: PolyUSD
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 amount)"
      - event: "Wrapped(address indexed caller, address indexed asset, address indexed to, uint256 amount)"
      - event: "Unwrapped(address indexed caller, address indexed asset, address indexed to, uint256 amount)"

  # ── Rewards ───────────────────────────────────────────────────────
  - name: Rewards
    events:
      - event: "DistributedRewards(address indexed user, uint256 amount)"
      - event: "MarketCreated(bytes32 indexed marketId, uint32 startTime, uint32 minSponsorDuration, uint256 minSponsorAmount, bytes marketData)"
      - event: "Sponsored(bytes32 indexed marketId, address indexed sponsor, uint256 amount, uint32 startTime, uint32 endTime, uint256 ratePerMinute)"
      - event: "Withdrawn(bytes32 indexed marketId, address indexed sponsor, uint256 returnedAmount, uint256 consumedAmount, bool isEarlyWithdraw)"
      - event: "MarketClosed(bytes32 indexed marketId, uint32 closedAt)"

chains:
  - id: 137 # Polygon
    start_block: 84902320 # PolyUSD deployment
    contracts:
      # CTF Exchange V2 — 3 instances (standard, neg-risk, third)
      - name: CTFExchangeV2
        address:
          - 0xe111180000d2663c0091e4f400237545b87b996b
          - 0xe2222d279d744050d28e00520010520000310f59
          - 0xe2222d002000ba0053cef3375333610f64600036
      # PolyUSD
      - name: PolyUSD
        address: 0xc011a7e12a19f7b1f670d46f03b03f3342e82dfb
      # Rewards
      - name: Rewards
        address: 0xdd8db71ce3be8d71ff148b2163d64da181a29e8b
